# ─────────────────────────────────────────────────────────────────────────────
# J.A.R.V.I.S — Central Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Identity ──────────────────────────────────────────────────────────────────
identity:
  name: "J.A.R.V.I.S"
  owner: "Sir"                     # How Jarvis addresses the user
  creator: "Sharan"                # Used in the LLM persona ("built by ___")

# ── LLM / Ollama ─────────────────────────────────────────────────────────────
llm:
  url: "http://localhost:11434"
  model: "llama3.2:3b"             # llama3.2:3b — fastest at 3B, 128K ctx
  timeout: 120                     # seconds
  history_limit: 6                 # fewer turns = smaller prompt = faster generation
  temperature: 0.2                  # lower = fewer hallucinations
  top_p: 0.80                       # tighter nucleus sampling
  num_ctx: 1024                    # half context = noticeably faster first token
  num_predict: 60                  # JARVIS answers short anyway
  repeat_penalty: 1.15              # penalise looping / padding

# ── Vision / VLM ─────────────────────────────────────────────────────────────
vision:
  model: "llava:13b"
  endpoint: "http://localhost:11434/api/generate"
  max_image_side: 896
  camera_index: 0
  timeout_sec: 90

# ── TTS ───────────────────────────────────────────────────────────────────────
tts:
  primary_voice: "en-US-GuyNeural"          # Edge TTS — neural
  fallback: "pyttsx3"                       # offline fallback

# ── STT / Microphone ──────────────────────────────────────────────────────────
stt:
  language: "en-IN"
  sample_rate: 16000
  energy_threshold: 250
  pause_threshold: 0.8             # seconds of silence before STT sends audio
  non_speaking_duration: 0.4       # ambient buffer at audio start
  mic_name: null                   # null = system default; set partial name to auto-select

# ── Wake Word ─────────────────────────────────────────────────────────────────
wake:
  keyword: "jarvis"
  sensitivity: 0.5                 # 0.0–1.0 (higher = more sensitive, more false positives)
  post_tts_cooldown: 1.2           # seconds to wait after speaking before listening

# ── Conversation ──────────────────────────────────────────────────────────────
conversation:
  idle_timeout: 600                # seconds before Jarvis returns to standby
  silent_prompt_threshold: 25     # seconds of silence before gentle nudge
  hard_timeout: 120               # seconds after nudge before auto-standby

# ── Memory ────────────────────────────────────────────────────────────────────
memory:
  db_path: "memory.db"
  migrate_json: "memory.json"      # migrate from old JSON on first run if exists
